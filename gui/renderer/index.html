<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>NEUTRINO Generator</h1>

  <div class="section">
    <label>Song Name:</label>
    <select id="song-select">
      <option value="">-- Select Song --</option>
    </select>
    <input id="song" type="text" />
  </div>

  <div class="section">
    <label>Parts:</label>
    <div id="parts">
      <label><input type="checkbox" value="Soprano" checked> Soprano</label>
      <label><input type="checkbox" value="Alto" checked> Alto</label>
      <label><input type="checkbox" value="Tenor" checked> Tenor</label>
      <label><input type="checkbox" value="Baritone" checked> Baritone</label>
    </div>
    <div id="model-select-area"></div>
  </div>

  <button id="run-button">Run NEUTRINO</button>

  <h2>Progress</h2>
  <div id="progress"></div>

  <h2>Log Output</h2>
  <pre id="log"></pre>

  <div id="error-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Error</h3>
      <pre id="error-message"></pre>
      <button id="error-close">Close</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
